<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>501호 오픈 마이크</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body { 
      font-family: 'Pretendard', sans-serif; 
      margin: 0; 
      padding: 20px; 
      background-color: #f4f5f7; 
      display: flex; 
      justify-content: center; 
      color: #333;
    }

    .app-box { 
      width: 100%;
      max-width: 450px; 
      background: #ffffff; 
      padding: 30px; 
      border-radius: 24px; 
      box-sizing: border-box; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
    }

    /* 메인 상단 사진 */
    .main-image {
      width: 100%;
      height: 200px; 
      object-fit: cover; 
      border-radius: 16px; 
      margin-bottom: 20px; 
    }

    h2 { color: #111; text-align: center; font-size: 1.6em; font-weight: 800; margin-top: 0; letter-spacing: -0.5px; }
    label { font-weight: 600; color: #666; font-size: 0.85em; margin-top: 20px; display: block; letter-spacing: -0.3px; }
    
    input, textarea { 
      display: block; 
      width: 100%; 
      max-width: 100%; 
      box-sizing: border-box; 
      padding: 14px 16px; 
      margin: 8px 0 15px 0; 
      border: 1px solid #e1e1e1; 
      border-radius: 12px; 
      font-size: 16px; 
      font-family: inherit; 
      background: #fafafa;
      color: #222;
      -webkit-appearance: none; 
      appearance: none;
      transition: 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #222; 
      background: #fff;
    }
    input { height: 50px; } 
    /* 여러 줄을 쓸 수 있도록 입력칸 높이를 넉넉하게 잡았습니다 */
    textarea { height: 100px; resize: none; line-height: 1.5; }

    #saveBtn { 
      width: 100%; padding: 16px; margin-top: 15px;
      background-color: #222; 
      color: white; border: none; 
      border-radius: 14px; font-size: 1.1em; font-weight: 700; cursor: pointer; 
      transition: 0.2s; 
    }
    #saveBtn:hover { background-color: #444; }

    .record-item { background: #fff; border: 1px solid #eaeaea; padding: 20px; margin-top: 20px; border-radius: 16px; position: relative;}
    .record-item h3 { margin-top: 0; color: #111; font-size: 1.2em; font-weight: 800; margin-bottom: 5px;}
    .record-item h4 { margin-top: 0; color: #555; font-size: 1em; font-weight: 600; margin-bottom: 15px;}
    .record-item p { font-size: 0.95em; color: #333; margin: 12px 0; line-height: 1.6;}
    
    /* 첨부된 코드 사진 디자인 */
    .chord-img-view { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }
    
    .link-btn { display: inline-block; margin-top: 12px; padding: 10px 18px; background: #f4f5f7; color: #222; text-decoration: none; border-radius: 10px; font-size: 0.9em; font-weight: 700; border: 1px solid #e1e1e1;}
    .link-btn:hover { background: #e9ecef; }

    .action-btns {
      margin-top: 20px;
      text-align: right;
      border-top: 1px solid #f0f0f0;
      padding-top: 15px;
    }
    .edit-btn, .delete-btn {
      background: none; border: none; font-size: 0.85em; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-weight: 600; margin-left: 5px;
    }
    .edit-btn { color: #555; background: #f4f5f7;}
    .edit-btn:hover { background: #e9ecef; }
    .delete-btn { color: #ff4d4f; background: #fff0f0;}
    .delete-btn:hover { background: #ffe5e5; }
  </style>
</head>
<body>

  <div class="app-box">
    <img src="https://images.unsplash.com/photo-1528243097678-739049bbf2e7?q=80&w=1000&auto=format&fit=crop" alt="메인 사진" class="main-image">

    <h2>🎤 501호 오픈 마이크</h2>
    
    <label>📅 레슨 날짜</label>
    <input type="date" id="date">

    <label>🎵 곡명 (연습곡)</label>
    <input type="text" id="song" placeholder="예: 변하은 - 기지개">

    <label>📝 오늘 배운 내용</label>
    <textarea id="overview" placeholder="예: 아르페지오 주법 기초&#10;자세 교정 등 편하게 엔터 치며 적으세요"></textarea>

    <label>💡스승님의 가르침</label>
    <textarea id="tips" placeholder="예: 엄지손가락에 힘 빼기&#10;자연스럽게 튕기기"></textarea>

    <label>🎸 새로 배운 코드</label>
    <textarea id="chords" placeholder="예: F코드, Bm7 등 여러 개 작성 가능"></textarea>

    <label>📸 새로 배운 코드 사진 (사진 주소 붙여넣기)</label>
    <input type="text" id="chordImage" placeholder="예: https://i.postimg.cc/.../chord.jpg">

    <label>🔥 다음 주 과제</label>
    <textarea id="homework" placeholder="예: 메트로놈 80에 맞춰 1절 완곡하기"></textarea>

    <label>🔗 참고 자료 (구글 드라이브 링크)</label>
    <input type="text" id="driveLink" placeholder="예: https://drive.google.com/file/d/...">

    <button id="saveBtn" onclick="saveLesson()">기록 저장하기</button>

    <div id="lessonList">
      </div>
  </div>

  <script>
    let editTargetId = null; 

    window.onload = renderList;

    // 엔터(줄바꿈)를 화면에 그대로 보여주기 위한 마법의 함수
    function formatText(text) {
      if (!text) return '';
      return text.replace(/\n/g, '<br>');
    }

    function saveLesson() {
      const date = document.getElementById('date').value;
      const song = document.getElementById('song').value;
      const overview = document.getElementById('overview').value;
      const tips = document.getElementById('tips').value;
      const chords = document.getElementById('chords').value;
      const chordImage = document.getElementById('chordImage').value; // 새 사진 기능 추가!
      const homework = document.getElementById('homework').value;
      const driveLink = document.getElementById('driveLink').value;

      if(!date || !overview) {
        alert('날짜와 배운 내용은 꼭 입력해 주세요!');
        return;
      }

      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];

      if (editTargetId) {
        const index = lessons.findIndex(lesson => lesson.id === editTargetId);
        if (index !== -1) {
          lessons[index] = { id: editTargetId, date, song, overview, tips, chords, chordImage, homework, driveLink };
        }
        editTargetId = null; 
        document.getElementById('saveBtn').innerText = '기록 저장하기'; 
        document.getElementById('saveBtn').style.backgroundColor = '#222'; 
      } else {
        const lesson = { id: Date.now(), date, song, overview, tips, chords, chordImage, homework, driveLink };
        lessons.unshift(lesson); 
      }

      localStorage.setItem('guitarLessons', JSON.stringify(lessons));
      
      document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');
      document.getElementById('date').value = '';
      document.getElementById('chordImage').value = '';
      document.getElementById('driveLink').value = '';
      
      renderList();
    }

    function editLesson(id) {
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
      const lesson = lessons.find(l => l.id === id);
      if(!lesson) return;

      document.getElementById('date').value = lesson.date;
      document.getElementById('song').value = lesson.song || '';
      document.getElementById('overview').value = lesson.overview || '';
      document.getElementById('tips').value = lesson.tips || '';
      document.getElementById('chords').value = lesson.chords || '';
      document.getElementById('chordImage').value = lesson.chordImage || '';
      document.getElementById('homework').value = lesson.homework || '';
      document.getElementById('driveLink').value = lesson.driveLink || '';

      editTargetId = id; 
      
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = '✨ 수정 완료하기';
      saveBtn.style.backgroundColor = '#1976D2'; 

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteLesson(id) {
      if(confirm('정말 이 기록을 삭제할까요? 지우면 복구할 수 없습니다!')) {
        let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
        lessons = lessons.filter(l => l.id !== id); 
        localStorage.setItem('guitarLessons', JSON.stringify(lessons));
        renderList();
      }
    }

    function renderList() {
      const list = document.getElementById('lessonList');
      list.innerHTML = '';
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];

      lessons.forEach(lesson => {
        let content = `<div class="record-item">
            <h3>📅 ${lesson.date}</h3>`;
            
            if(lesson.song) content += `<h4>🎵 ${lesson.song}</h4>`;
            if(lesson.overview) content += `<p><strong>📝 배운 내용:</strong><br>${formatText(lesson.overview)}</p>`;
            if(lesson.tips) content += `<p><strong>💡 꿀팁 & 노하우:</strong><br>${formatText(lesson.tips)}</p>`;
            if(lesson.chords) content += `<p><strong>🎸 코드:</strong><br>${formatText(lesson.chords)}</p>`;
            
            // 코드 사진 주소가 있으면 사진 띄워주기!
            if(lesson.chordImage) content += `<img src="${lesson.chordImage}" class="chord-img-view" alt="코드 사진">`;
            
            if(lesson.homework) content += `<p style="color:#ff4d4f;"><strong>🔥 과제:</strong><br>${formatText(lesson.homework)}</p>`;
            if(lesson.driveLink) content += `<a href="${lesson.driveLink}" target="_blank" class="link-btn">📁 자료 보기</a>`;
            
            content += `
            <div class="action-btns">
              <button class="edit-btn" onclick="editLesson(${lesson.id})">수정</button>
              <button class="delete-btn" onclick="deleteLesson(${lesson.id})">삭제</button>
            </div>`;
            
        content += `</div>`;
        list.innerHTML += content;
      });
    }
  </script>

</body>
</html>
