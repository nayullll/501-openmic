<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>501호 오픈 마이크</title>
  
  <link rel="apple-touch-icon" href="https://i.postimg.cc/C1bnY8Ln/IMG-6011.webp?v=3">

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body { 
      font-family: 'Pretendard', sans-serif; 
      margin: 0; 
      padding: 20px; 
      background-color: #f4f5f7; 
      display: flex; 
      justify-content: center; 
      color: #333;
      overflow-x: hidden;
      overscroll-behavior-y: none; /* 👇 아이폰 기본 고무줄 효과 끄기 (충돌 방지) */
    }

    .app-box { 
      width: 100%;
      max-width: 450px; 
      background: #ffffff; 
      padding: 30px; 
      border-radius: 24px; 
      box-sizing: border-box; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
      position: relative;
      z-index: 2;
    }

    .pull-indicator {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 1.5em;
      color: #888;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .main-image {
      width: 100%;
      height: 200px; 
      object-fit: cover; 
      border-radius: 16px; 
      margin-bottom: 20px; 
    }

    /* 👇 제목과 새로고침 버튼 나란히 배치 */
    .title-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      margin-bottom: 5px;
    }

    h2 { color: #111; text-align: center; font-size: 1.6em; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
    
    /* 🔄 새로고침 버튼 디자인 */
    .refresh-btn {
      position: absolute;
      right: 0;
      background: #ffffff;
      border: 1px solid #e1e1e1;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
    }
    .refresh-btn:active {
      transform: rotate(180deg) scale(0.9);
      background: #f4f5f7;
    }

    label { font-weight: 600; color: #666; font-size: 0.85em; margin-top: 20px; display: block; letter-spacing: -0.3px; }
    
    input, textarea { 
      display: block; 
      width: 100%; 
      max-width: 100%; 
      box-sizing: border-box; 
      padding: 14px 16px; 
      margin: 8px 0 15px 0; 
      border: 1px solid #e1e1e1; 
      border-radius: 12px; 
      font-size: 16px; 
      font-family: inherit; 
      background: #fafafa;
      color: #222;
      -webkit-appearance: none; 
      appearance: none;
      transition: 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #222; background: #fff; }
    input { height: 50px; } 
    textarea { height: 100px; resize: none; line-height: 1.5; }

    .chord-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .chord-input-row input { margin: 0; }
    .chord-input-row .chord-name { flex: 1; } 
    .chord-input-row .chord-link { flex: 2; } 
    
    .add-row-btn {
      background: #f0f0f0; color: #555; text-align: center; padding: 12px; 
      border-radius: 10px; font-size: 0.9em; font-weight: 700; cursor: pointer; 
      margin-top: 5px; margin-bottom: 15px; transition: 0.2s;
    }
    .add-row-btn:hover { background: #e5e5e5; color: #222; }

    /* 오렌지색 3열 정사각형 코드 박스 유지! */
    .chord-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; background: #fafafa; padding: 15px; border-radius: 12px; }
    .chord-card { background: #EDA18C; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; text-align: center; box-shadow: 0 4px 10px rgba(237, 161, 140, 0.3); aspect-ratio: 1 / 1; }
    .chord-card p { margin: 0; font-weight: 800; font-size: 1.2em; color: #ffffff; overflow-wrap: break-word; }
    .chord-link-btn { display: inline-block; margin-top: 8px; padding: 6px 10px; background: #ffffff; color: #EDA18C; text-decoration: none; border-radius: 8px; font-size: 0.8em; font-weight: 800; border: none; transition: 0.2s; white-space: nowrap; }
    .chord-link-btn:hover { background: #f8f8f8; }
    
    #saveBtn { 
      width: 100%; padding: 16px; margin-top: 15px; background-color: #222; 
      color: white; border: none; border-radius: 14px; font-size: 1.05em; font-weight: 700; cursor: pointer; transition: 0.2s; 
      line-height: 1.4; word-break: keep-all;
    }
    #saveBtn:hover { background-color: #444; }

    .search-box { margin-top: 40px; margin-bottom: 15px; position: relative; }
    .search-box input { background: #fff; border: 2px solid #222; font-weight: 600; }
    .search-box input:focus { border-color: #1976D2; box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.1); }

    .record-item { background: #fff; border: 1px solid #eaeaea; padding: 20px; margin-top: 15px; border-radius: 16px; position: relative; }
    
    .record-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .record-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .record-header h3 { margin: 0; color: #111; font-size: 1.1em; font-weight: 800; }
    .record-header .song-badge { font-size: 0.85em; background: #f0f0f0; color: #555; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
    .toggle-icon { font-size: 0.8em; color: #888; transition: transform 0.3s ease; }
    .toggle-icon.open { transform: rotate(180deg); } 
    
    .record-details { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; display: none; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    .record-item p { font-size: 0.95em; color: #333; margin: 12px 0; line-height: 1.6;}
    .link-btn { display: inline-block; margin-top: 12px; padding: 10px 18px; background: #f4f5f7; color: #222; text-decoration: none; border-radius: 10px; font-size: 0.9em; font-weight: 700; border: 1px solid #e1e1e1;}
    .link-btn:hover { background: #e9ecef; }
    .action-btns { margin-top: 20px; text-align: right; border-top: 1px solid #f0f0f0; padding-top: 15px; }
    .edit-btn, .delete-btn { background: none; border: none; font-size: 0.85em; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-weight: 600; margin-left: 5px; }
    .edit-btn { color: #555; background: #f4f5f7;}
    .edit-btn:hover { background: #e9ecef; }
    .delete-btn { color: #ff4d4f; background: #fff0f0;}
    .delete-btn:hover { background: #ffe5e5; }
  </style>
</head>
<body>

  <div class="pull-indicator" id="pullIndicator">⬇️</div>

  <div class="app-box" id="appBox">
    <img src="https://i.postimg.cc/rmfjc5Yn/IMG-6009.jpg" alt="메인 사진" class="main-image">

    <div class="title-wrap">
      <h2>🎤 501호 오픈 마이크</h2>
      <button class="refresh-btn" onclick="window.location.reload()">🔄</button>
    </div>
    
    <label>📅 레슨 날짜</label>
    <input type="date" id="date">

    <label>🎵 곡명 (연습곡)</label>
    <input type="text" id="song" placeholder="예: 변하은 - 기지개">

    <label>📝 오늘 배운 내용</label>
    <textarea id="overview" placeholder="sus4"></textarea>

    <label>💡스승님의 특급 꿀팁</label>
    <textarea id="tips" placeholder="연습을 너무 열심히 해선 안된다!"></textarea>

    <label>🎸 새로 배운 코드</label>
    <div id="chordInputContainer"></div>
    <div class="add-row-btn" onclick="addChordRow()">+ 코드 칸 추가하기</div>

    <label>🔥 다음 주 과제</label>
    <textarea id="homework" placeholder="재미있다!!!"></textarea>

    <label>💭 나의 연습 일기 & 궁금증</label>
    <textarea id="selfNote" placeholder="깨달은 점, 안 되는 부분, 스승님께 여쭤볼 질문 등을 자유롭게 적어보세요."></textarea>

    <label>🔗 참고 자료 (구글 드라이브 링크)</label>
    <input type="text" id="driveLink" placeholder="예: https://drive.google.com/file/d/...">

    <button id="saveBtn" onclick="saveLesson()">누가 그랬던가 잊혀져 간다는 게 일부러 그런 건 아닙디다</button>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 곡명, 내용, 코드 등으로 검색..." onkeyup="renderList()">
    </div>

    <div id="lessonList"></div>
  </div>

  <script>
    let editTargetId = null; 

    window.onload = () => {
      renderList();
      addChordRow(); 
    };

    function formatText(text) {
      if (!text) return '';
      return text.replace(/\n/g, '<br>');
    }

    function addChordRow(nameStr = '', linkStr = '') {
      const container = document.getElementById('chordInputContainer');
      const row = document.createElement('div');
      row.className = 'chord-input-row';
      row.innerHTML = `
        <input type="text" class="chord-name" placeholder="코드명(F)" value="${nameStr}">
        <input type="text" class="chord-link" placeholder="구글 드라이브 링크" value="${linkStr}">
      `;
      container.appendChild(row);
    }

    function saveLesson() {
      const date = document.getElementById('date').value;
      const song = document.getElementById('song').value;
      const overview = document.getElementById('overview').value;
      const tips = document.getElementById('tips').value;
      const homework = document.getElementById('homework').value;
      const selfNote = document.getElementById('selfNote').value;
      const driveLink = document.getElementById('driveLink').value;

      if(!date || !overview) {
        alert('날짜와 배운 내용은 꼭 입력해 주세요!');
        return;
      }

      const chordRows = document.querySelectorAll('.chord-input-row');
      let chordsList = [];
      chordRows.forEach(row => {
        const name = row.querySelector('.chord-name').value;
        const link = row.querySelector('.chord-link').value;
        if (name || link) {
          chordsList.push({ name: name, link: link });
        }
      });

      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];

      if (editTargetId) {
        const index = lessons.findIndex(lesson => lesson.id === editTargetId);
        if (index !== -1) {
          lessons[index] = { id: editTargetId, date, song, overview, tips, chordsList, homework, selfNote, driveLink };
        }
        editTargetId = null; 
        document.getElementById('saveBtn').innerText = '누가 그랬던가 잊혀져 간다는 게 일부러 그런 건 아닙디다'; 
        document.getElementById('saveBtn').style.backgroundColor = '#222'; 
      } else {
        const lesson = { id: Date.now(), date, song, overview, tips, chordsList, homework, selfNote, driveLink };
        lessons.unshift(lesson); 
      }

      localStorage.setItem('guitarLessons', JSON.stringify(lessons));
      
      document.querySelectorAll('input[type="text"]:not(.chord-name):not(.chord-link), textarea').forEach(el => el.value = '');
      document.getElementById('date').value = '';
      document.getElementById('chordInputContainer').innerHTML = ''; 
      addChordRow(); 
      
      renderList();
    }

    function editLesson(id) {
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
      const lesson = lessons.find(l => l.id === id);
      if(!lesson) return;

      document.getElementById('date').value = lesson.date;
      document.getElementById('song').value = lesson.song || '';
      document.getElementById('overview').value = lesson.overview || '';
      document.getElementById('tips').value = lesson.tips || '';
      document.getElementById('homework').value = lesson.homework || '';
      document.getElementById('selfNote').value = lesson.selfNote || ''; 
      document.getElementById('driveLink').value = lesson.driveLink || '';

      const container = document.getElementById('chordInputContainer');
      container.innerHTML = ''; 
      if (lesson.chordsList && lesson.chordsList.length > 0) {
        lesson.chordsList.forEach(c => addChordRow(c.name, c.link || c.img)); 
      } else {
        addChordRow(); 
      }

      editTargetId = id; 
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = '✨ 수정 완료하기';
      saveBtn.style.backgroundColor = '#1976D2'; 

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteLesson(id) {
      if(confirm('정말 이 기록을 삭제할까요? 지우면 복구할 수 없습니다!')) {
        let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
        lessons = lessons.filter(l => l.id !== id); 
        localStorage.setItem('guitarLessons', JSON.stringify(lessons));
        renderList();
      }
    }

    function toggleDetails(id) {
      const details = document.getElementById(`details-${id}`);
      const icon = document.getElementById(`icon-${id}`);
      
      if (details.style.display === 'block') {
        details.style.display = 'none';
        icon.classList.remove('open');
      } else {
        details.style.display = 'block';
        icon.classList.add('open');
      }
    }

    function renderList() {
      const list = document.getElementById('lessonList');
      list.innerHTML = '';
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];

      const searchInput = document.getElementById('searchInput');
      const keyword = searchInput ? searchInput.value.toLowerCase() : '';

      const filteredLessons = lessons.filter(lesson => {
        if(!keyword) return true;
        
        let searchText = (lesson.date || '') + ' ' + (lesson.song || '') + ' ' + 
                         (lesson.overview || '') + ' ' + (lesson.tips || '') + ' ' + 
                         (lesson.homework || '') + ' ' + (lesson.selfNote || '');
        if (lesson.chordsList) {
          searchText += ' ' + lesson.chordsList.map(c => c.name).join(' ');
        }
        return searchText.toLowerCase().includes(keyword);
      });

      if(filteredLessons.length === 0 && keyword !== '') {
        list.innerHTML = `<p style="text-align:center; color:#888; margin-top:30px; font-weight:600;">"${keyword}"에 대한 기록이 없어요! 🎸</p>`;
        return;
      }

      filteredLessons.forEach(lesson => {
        let content = `<div class="record-item">
            <div class="record-header" onclick="toggleDetails(${lesson.id})">
              <div class="record-header-left">
                <h3>📅 ${lesson.date}</h3>`;
                if(lesson.song) content += `<span class="song-badge">🎵 ${lesson.song}</span>`;
            content += `
              </div>
              <div class="toggle-icon" id="icon-${lesson.id}">▼</div>
            </div>
            
            <div class="record-details" id="details-${lesson.id}">`;
            
            if(lesson.overview) content += `<p><strong>📝 배운 내용:</strong><br>${formatText(lesson.overview)}</p>`;
            if(lesson.tips) content += `<p><strong>💡 꿀팁 & 노하우:</strong><br>${formatText(lesson.tips)}</p>`;
            
            if(lesson.chordsList && lesson.chordsList.length > 0) {
              content += `<p><strong>🎸 새로 배운 코드:</strong></p><div class="chord-grid">`;
              lesson.chordsList.forEach(c => {
                content += `<div class="chord-card">`;
                if(c.name) content += `<p>${c.name}</p>`;
                if(c.link || c.img) {
                  const targetLink = c.link ? c.link : c.img;
                  content += `<a href="${targetLink}" target="_blank" class="chord-link-btn">🖼️ 사진 보기</a>`;
                }
                content += `</div>`;
              });
              content += `</div>`;
            } else if (lesson.chords) { 
              content += `<p><strong>🎸 코드:</strong><br>${formatText(lesson.chords)}</p>`;
            }
            
            if(lesson.homework) content += `<p style="color:#ff4d4f;"><strong>🔥 과제:</strong><br>${formatText(lesson.homework)}</p>`;
            
            if(lesson.selfNote) content += `<p style="color:#1976D2;"><strong>💭 나의 연습 일기:</strong><br>${formatText(lesson.selfNote)}</p>`;
            
            if(lesson.driveLink) content += `<a href="${lesson.driveLink}" target="_blank" class="link-btn">📁 자료 보기</a>`;
            
            content += `
            <div class="action-btns">
              <button class="edit-btn" onclick="editLesson(${lesson.id}); toggleDetails(${lesson.id});">수정</button>
              <button class="delete-btn" onclick="deleteLesson(${lesson.id})">삭제</button>
            </div>
          </div>`; 
            
        content += `</div>`; 
        list.innerHTML += content;
      });
    }

    // 👇 아이폰 고집 꺾기 (scrollY 조건을 <= 0 으로 완화했습니다)
    let startY = 0;
    let currentY = 0;
    let isPulling = false;
    const appBox = document.getElementById('appBox');
    const indicator = document.getElementById('pullIndicator');

    document.addEventListener('touchstart', function(e) {
      if (window.scrollY <= 0) { // 여기서 아이폰 튕김을 잡아줍니다
        startY = e.touches[0].clientY;
        isPulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!isPulling) return;
      currentY = e.touches[0].clientY;
      let pullDistance = currentY - startY;
      
      if (pullDistance > 0 && window.scrollY <= 0) {
        indicator.style.opacity = '1'; 
        let moveY = Math.min(pullDistance * 0.4, 70); 
        appBox.style.transform = `translateY(${moveY}px)`;
        
        if(pullDistance > 120) {
          indicator.innerText = '🔄';
          indicator.style.transform = 'rotate(180deg)';
        } else {
          indicator.innerText = '⬇️';
          indicator.style.transform = 'rotate(0deg)';
        }
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (!isPulling) return;
      isPulling = false;
      let pullDistance = currentY - startY;
      
      if (pullDistance > 120 && window.scrollY <= 0) {
        appBox.style.transform = `translateY(50px)`;
        indicator.innerText = '🔄';
        setTimeout(() => window.location.reload(), 200); 
      } else {
        appBox.style.transition = 'transform 0.3s cubic-bezier(0.25, 1.5, 0.5, 1)'; 
        appBox.style.transform = 'translateY(0)';
        indicator.style.opacity = '0';
        setTimeout(() => { appBox.style.transition = ''; }, 300);
      }
    });
  </script>

</body>
</html>
