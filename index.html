<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>501호 오픈 마이크</title>
  <link rel="apple-touch-icon" href="https://i.postimg.cc/C1bnY8Ln/IMG-6011.jpg?v=8">

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background-color: #f4f5f7; display: flex; justify-content: center; color: #333; }
    .app-box { width: 100%; max-width: 450px; background: #ffffff; padding: 30px; border-radius: 24px; box-sizing: border-box; shadow: 0 15px 35px rgba(0,0,0,0.05); }
    .main-image { width: 100%; height: 200px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
    h2 { color: #111; text-align: center; font-size: 1.6em; font-weight: 800; margin: 0 0 20px 0; letter-spacing: -0.5px; }
    
    label { font-weight: 600; color: #666; font-size: 0.85em; margin-top: 20px; display: block; }
    input, textarea { 
      display: block; width: 100%; box-sizing: border-box; padding: 14px 16px; margin: 8px 0 10px 0; 
      border: 1px solid #e1e1e1; border-radius: 12px; font-size: 16px; font-family: inherit; 
      background: #fafafa; color: #222; transition: 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #222; background: #fff; }
    textarea { height: 80px; resize: none; }

    /* 입력 행 스타일 (코드 & 링크 공통) */
    .dynamic-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .dynamic-row input { margin: 0; }
    .name-input { flex: 1.2; }
    .link-input { flex: 2; }
    
    .add-btn { background: #f0f0f0; color: #555; text-align: center; padding: 10px; border-radius: 10px; font-size: 0.85em; font-weight: 700; cursor: pointer; margin-bottom: 15px; }

    /* 코드 그리드 (작고 앙증맞은 사이즈) */
    .chord-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; background: #fafafa; padding: 10px; border-radius: 12px; }
    .chord-card { 
      background: #EDA18C; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; 
      aspect-ratio: 1 / 1; box-sizing: border-box; padding: 5px; text-align: center; min-width: 0;
    }
    .chord-card p { margin: 0; font-weight: 800; font-size: 1.05em; color: white; word-break: break-all; }
    .mini-link-btn { margin-top: 5px; padding: 3px 6px; background: white; color: #EDA18C; text-decoration: none; border-radius: 5px; font-size: 0.7em; font-weight: 800; white-space: nowrap; }

    /* 참고 자료 링크 버튼 스타일 */
    .resource-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .res-btn { background: #eef5ff; color: #1976D2; padding: 8px 14px; border-radius: 10px; text-decoration: none; font-size: 0.85em; font-weight: 700; border: 1px solid #d0e3ff; }

    #saveBtn { width: 100%; padding: 16px; margin-top: 20px; background: #222; color: white; border: none; border-radius: 14px; font-size: 1em; font-weight: 700; cursor: pointer; }
    
    .record-item { background: #fff; border: 1px solid #eaeaea; padding: 20px; margin-top: 15px; border-radius: 16px; }
    .record-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .record-header h3 { margin: 0; font-size: 1.1em; font-weight: 800; }
    .song-badge { font-size: 0.8em; background: #f0f0f0; padding: 4px 10px; border-radius: 12px; color: #555; }
    .record-details { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; display: none; }
    .record-details p { font-size: 0.95em; line-height: 1.6; margin: 10px 0; }

    .action-btns { margin-top: 15px; text-align: right; }
    .edit-btn, .delete-btn { border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.8em; font-weight: 600; margin-left: 5px; cursor: pointer; }
    .edit-btn { background: #f4f5f7; color: #555; }
    .delete-btn { background: #fff0f0; color: #ff4d4f; }
  </style>
</head>
<body>

<div class="app-box">
  <img src="https://i.postimg.cc/rmfjc5Yn/IMG-6009.jpg" class="main-image">
  <h2>🎤 501호 오픈 마이크</h2>

  <label>📅 레슨 날짜</label>
  <input type="date" id="date">

  <label>🎵 곡명 (연습곡)</label>
  <input type="text" id="song" placeholder="곡 제목을 입력하세요">

  <label>📝 오늘 배운 내용</label>
  <textarea id="overview"></textarea>

  <label>💡 스승님의 특급 꿀팁</label>
  <textarea id="tips"></textarea>

  <label>🎸 새로 배운 코드</label>
  <div id="chordContainer"></div>
  <div class="add-btn" onclick="addRow('chordContainer', '코드명(Ab)', '링크')">+ 코드 추가</div>

  <label>🔗 참고 자료 (제목과 링크)</label>
  <div id="resourceContainer"></div>
  <div class="add-btn" onclick="addRow('resourceContainer', '자료 이름', '링크')">+ 자료 추가</div>

  <label>🔥 다음 주 과제</label>
  <textarea id="homework"></textarea>

  <button id="saveBtn" onclick="saveLesson()">기록 저장하기</button>

  <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
  <div id="lessonList"></div>
</div>

<script>
  let editTargetId = null;

  window.onload = () => {
    renderList();
    addRow('chordContainer', '코드명(Ab)', '링크');
    addRow('resourceContainer', '자료 이름', '링크');
  };

  // 행 추가 함수 (코드와 자료 공통 사용)
  function addRow(containerId, p1, p2, v1 = '', v2 = '') {
    const container = document.getElementById(containerId);
    const row = document.createElement('div');
    row.className = 'dynamic-row';
    row.innerHTML = `
      <input type="text" class="name-input" placeholder="${p1}" value="${v1}">
      <input type="text" class="link-input" placeholder="${p2}" value="${v2}">
    `;
    container.appendChild(row);
  }

  function saveLesson() {
    const date = document.getElementById('date').value;
    const song = document.getElementById('song').value;
    const overview = document.getElementById('overview').value;
    const tips = document.getElementById('tips').value;
    const homework = document.getElementById('homework').value;

    if(!date || !overview) { alert('날짜와 내용은 필수입니다!'); return; }

    // 코드 데이터 수집
    const chords = [];
    document.querySelectorAll('#chordContainer .dynamic-row').forEach(row => {
      const name = row.querySelector('.name-input').value;
      const link = row.querySelector('.link-input').value;
      if(name) chords.push({ name, link });
    });

    // 참고 자료 데이터 수집 (제목과 링크 모두 수집)
    const resources = [];
    document.querySelectorAll('#resourceContainer .dynamic-row').forEach(row => {
      const name = row.querySelector('.name-input').value;
      const link = row.querySelector('.link-input').value;
      if(name) resources.push({ name, link });
    });

    let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
    const lessonData = { id: editTargetId || Date.now(), date, song, overview, tips, chords, resources, homework };

    if(editTargetId) {
      const idx = lessons.findIndex(l => l.id === editTargetId);
      lessons[idx] = lessonData;
      editTargetId = null;
      document.getElementById('saveBtn').innerText = '기록 저장하기';
    } else {
      lessons.unshift(lessonData);
    }

    localStorage.setItem('guitarLessons', JSON.stringify(lessons));
    location.reload(); 
  }

  function renderList() {
    const list = document.getElementById('lessonList');
    const lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
    list.innerHTML = '';

    lessons.forEach(l => {
      const item = document.createElement('div');
      item.className = 'record-item';
      item.innerHTML = `
        <div class="record-header" onclick="toggleDetails(${l.id})">
          <h3>📅 ${l.date}</h3>
          <span class="song-badge">${l.song || '연습곡'}</span>
        </div>
        <div class="record-details" id="details-${l.id}">
          <p><strong>📝 내용:</strong><br>${l.overview.replace(/\n/g, '<br>')}</p>
          ${l.tips ? `<p><strong>💡 꿀팁:</strong><br>${l.tips.replace(/\n/g, '<br>')}</p>` : ''}
          
          ${l.chords && l.chords.length > 0 ? `<div class="chord-grid">` + 
            l.chords.map(c => `<div class="chord-card"><p>${c.name}</p>${c.link ? `<a href="${c.link}" target="_blank" class="mini-link-btn">보기</a>` : ''}</div>`).join('') + `</div>` : ''}
          
          ${l.resources && l.resources.length > 0 ? `<div class="resource-links">` + 
            l.resources.map(r => `<a href="${r.link}" target="_blank" class="res-btn">📁 ${r.name}</a>`).join('') + `</div>` : ''}
          
          <p><strong>🔥 과제:</strong> ${l.homework || '없음'}</p>
          <div class="action-btns">
            <button class="edit-btn" onclick="editLesson(${l.id})">수정</button>
            <button class="delete-btn" onclick="deleteLesson(${l.id})">삭제</button>
          </div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  function toggleDetails(id) {
    const el = document.getElementById(`details-${id}`);
    if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
  }

  function editLesson(id) {
    const lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
    const l = lessons.find(l => l.id === id);
    if(!l) return;

    document.getElementById('date').value = l.date;
    document.getElementById('song').value = l.song;
    document.getElementById('overview').value = l.overview;
    document.getElementById('tips').value = l.tips;
    document.getElementById('homework').value = l.homework;

    document.getElementById('chordContainer').innerHTML = '';
    if(l.chords && l.chords.length > 0) {
      l.chords.forEach(c => addRow('chordContainer', '코드명(Ab)', '링크', c.name, c.link));
    } else {
      addRow('chordContainer', '코드명(Ab)', '링크');
    }
    
    document.getElementById('resourceContainer').innerHTML = '';
    if(l.resources && l.resources.length > 0) {
      l.resources.forEach(r => addRow('resourceContainer', '자료 이름', '링크', r.name, r.link));
    } else {
      addRow('resourceContainer', '자료 이름', '링크');
    }

    editTargetId = id;
    document.getElementById('saveBtn').innerText = '✨ 수정 완료하기';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteLesson(id) {
    if(confirm('정말 삭제할까요?')) {
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
      lessons = lessons.filter(l => l.id !== id);
      localStorage.setItem('guitarLessons', JSON.stringify(lessons));
      renderList();
    }
  }
</script>
</body>
</html>
