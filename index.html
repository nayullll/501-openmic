<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>501호 오픈 마이크</title>
  <style>
    /* 👇 요즘 대세! 세련되고 깔끔한 'Pretendard' 폰트 불러오기 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body { 
      font-family: 'Pretendard', sans-serif; 
      margin: 0; 
      padding: 20px; 
      background-color: #f4f5f7; /* 눈이 편안한 모던 연회색 배경 */
      display: flex; 
      justify-content: center; 
      color: #333;
    }

    .app-box { 
      width: 100%;
      max-width: 450px; 
      background: #ffffff; /* 깔끔한 올화이트 박스 */
      padding: 30px; 
      border-radius: 24px; /* 요즘 앱 트렌드에 맞춘 둥근 모서리 */
      box-sizing: border-box; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.05); /* 은은하고 고급스러운 그림자 */
    }

    h2 { color: #111; text-align: center; font-size: 1.6em; font-weight: 800; margin-top: 0; letter-spacing: -0.5px; }
    label { font-weight: 600; color: #666; font-size: 0.85em; margin-top: 20px; display: block; letter-spacing: -0.3px; }
    
    input, textarea { 
      display: block; 
      width: 100%; 
      max-width: 100%; 
      box-sizing: border-box; 
      padding: 14px 16px; 
      margin: 8px 0 15px 0; 
      border: 1px solid #e1e1e1; 
      border-radius: 12px; 
      font-size: 16px; 
      font-family: inherit; 
      background: #fafafa;
      color: #222;
      -webkit-appearance: none; 
      appearance: none;
      transition: 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #222; /* 터치했을 때 시크하게 블랙 테두리로 강조! */
      background: #fff;
    }
    input { height: 50px; } 
    textarea { height: 90px; resize: none; }

    #saveBtn { 
      width: 100%; padding: 16px; margin-top: 15px;
      background-color: #222; /* 시크한 블랙 버튼 */
      color: white; border: none; 
      border-radius: 14px; font-size: 1.1em; font-weight: 700; cursor: pointer; 
      transition: 0.2s; 
    }
    #saveBtn:hover { background-color: #444; }

    .record-item { background: #fff; border: 1px solid #eaeaea; padding: 20px; margin-top: 20px; border-radius: 16px; position: relative;}
    .record-item h3 { margin-top: 0; color: #111; font-size: 1.1em; font-weight: 700; margin-bottom: 15px;}
    .record-item p { font-size: 0.95em; color: #444; margin: 8px 0; line-height: 1.5;}
    .tag { display: inline-block; background: #f0f0f0; padding: 4px 10px; border-radius: 8px; font-size: 0.8em; margin-right: 5px; color: #555; font-weight: 600;}
    .link-btn { display: inline-block; margin-top: 12px; padding: 10px 18px; background: #f4f5f7; color: #222; text-decoration: none; border-radius: 10px; font-size: 0.9em; font-weight: 700; border: 1px solid #e1e1e1;}
    .link-btn:hover { background: #e9ecef; }

    .action-btns {
      margin-top: 20px;
      text-align: right;
      border-top: 1px solid #f0f0f0;
      padding-top: 15px;
    }
    .edit-btn, .delete-btn {
      background: none; border: none; font-size: 0.85em; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-weight: 600; margin-left: 5px;
    }
    .edit-btn { color: #555; background: #f4f5f7;}
    .edit-btn:hover { background: #e9ecef; }
    .delete-btn { color: #ff4d4f; background: #fff0f0;}
    .delete-btn:hover { background: #ffe5e5; }
  </style>
</head>
<body>

  <div class="app-box">
    <h2>🎤 501호 오픈 마이크</h2>
    
    <label>📅 레슨 날짜</label>
    <input type="date" id="date">

    <label>🎵 곡명 (연습곡)</label>
    <input type="text" id="song" placeholder="예: 변하은 - 기지개">

    <label>📝 오늘 배운 내용 (개요)</label>
    <input type="text" id="overview" placeholder="예: 아르페지오 주법 기초 및 자세 교정">

    <label>💡 선생님의 꿀팁 & 노하우</label>
    <textarea id="tips" placeholder="예: 엄지손가락에 힘을 빼고 자연스럽게 튕기기"></textarea>

    <label>🎸 새로 배운 코드</label>
    <input type="text" id="chords" placeholder="예: F코드, Bm7">

    <label>🔥 다음 주 과제</label>
    <input type="text" id="homework" placeholder="예: 메트로놈 80에 맞춰 1절 완곡하기">

    <label>🔗 참고 자료 (구글 드라이브 링크)</label>
    <input type="text" id="driveLink" placeholder="예: https://drive.google.com/file/d/...">

    <button id="saveBtn" onclick="saveLesson()">기록 저장하기</button>

    <div id="lessonList">
      </div>
  </div>

  <script>
    let editTargetId = null; 

    window.onload = renderList;

    function saveLesson() {
      const date = document.getElementById('date').value;
      const song = document.getElementById('song').value;
      const overview = document.getElementById('overview').value;
      const tips = document.getElementById('tips').value;
      const chords = document.getElementById('chords').value;
      const homework = document.getElementById('homework').value;
      const driveLink = document.getElementById('driveLink').value;

      if(!date || !overview) {
        alert('날짜와 배운 내용은 꼭 입력해 주세요!');
        return;
      }

      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];

      if (editTargetId) {
        const index = lessons.findIndex(lesson => lesson.id === editTargetId);
        if (index !== -1) {
          lessons[index] = { id: editTargetId, date, song, overview, tips, chords, homework, driveLink };
        }
        editTargetId = null; 
        document.getElementById('saveBtn').innerText = '기록 저장하기'; 
        document.getElementById('saveBtn').style.backgroundColor = '#222'; /* 원래 블랙으로 복구 */
      } else {
        const lesson = { id: Date.now(), date, song, overview, tips, chords, homework, driveLink };
        lessons.unshift(lesson); 
      }

      localStorage.setItem('guitarLessons', JSON.stringify(lessons));
      
      document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');
      document.getElementById('date').value = '';
      document.getElementById('driveLink').value = '';
      
      renderList();
    }

    function editLesson(id) {
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
      const lesson = lessons.find(l => l.id === id);
      if(!lesson) return;

      document.getElementById('date').value = lesson.date;
      document.getElementById('song').value = lesson.song || '';
      document.getElementById('overview').value = lesson.overview || '';
      document.getElementById('tips').value = lesson.tips || '';
      document.getElementById('chords').value = lesson.chords || '';
      document.getElementById('homework').value = lesson.homework || '';
      document.getElementById('driveLink').value = lesson.driveLink || '';

      editTargetId = id; 
      
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = '✨ 수정 완료하기';
      saveBtn.style.backgroundColor = '#1976D2'; 

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteLesson(id) {
      if(confirm('정말 이 기록을 삭제할까요? 지우면 복구할 수 없습니다!')) {
        let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];
        lessons = lessons.filter(l => l.id !== id); 
        localStorage.setItem('guitarLessons', JSON.stringify(lessons));
        renderList();
      }
    }

    function renderList() {
      const list = document.getElementById('lessonList');
      list.innerHTML = '';
      let lessons = JSON.parse(localStorage.getItem('guitarLessons')) || [];

      lessons.forEach(lesson => {
        let content = `<div class="record-item">
            <h3>${lesson.date} - ${lesson.overview}</h3>`;
            if(lesson.song) content += `<p><strong>🎵 곡명:</strong> ${lesson.song}</p>`;
            if(lesson.chords) content += `<p><span class="tag">코드</span> ${lesson.chords}</p>`;
            if(lesson.tips) content += `<p><strong>💡 꿀팁:</strong> ${lesson.tips}</p>`;
            if(lesson.homework) content += `<p style="color:#ff4d4f;"><strong>🔥 과제:</strong> ${lesson.homework}</p>`;
            if(lesson.driveLink) content += `<a href="${lesson.driveLink}" target="_blank" class="link-btn">📁 자료 보기</a>`;
            
            content += `
            <div class="action-btns">
              <button class="edit-btn" onclick="editLesson(${lesson.id})">수정</button>
              <button class="delete-btn" onclick="deleteLesson(${lesson.id})">삭제</button>
            </div>`;
            
        content += `</div>`;
        list.innerHTML += content;
      });
    }
  </script>

</body>
</html>
